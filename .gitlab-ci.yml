stages:
  - test
  - build_release
  - secret-detection

variables:
  SECRET_DETECTION_ENABLED: 'true'
  FF_USE_DOCKER_NETWORK: 'true'

# Shared setup for Flutter projects (Android)
.flutter_setup: &flutter_setup
  image:
    name: instrumentisto/flutter:latest
    entrypoint: [""]
  cache:
    paths:
      - .pub-cache/
      - build/
  before_script:
    - mkdir -p .pub-cache
    - cp $ENV_FILE .env.json
    - cp $FIREBASE_ANDROID_CONFIG android/app/google-services.json
    - flutter clean
    - flutter pub get

# iOS-specific setup
.flutter_setup_ios: &flutter_setup_ios
  variables:
    FLUTTER_VERSION: "3.41.4"
  cache:
    paths:
      - .pub-cache/
      - flutter-macos/
  before_script:
    - mkdir -p .pub-cache
    - |
      if [ ! -d "flutter-macos/bin" ]; then
        curl -fsSL "https://storage.googleapis.com/flutter_infra_release/releases/stable/macos/flutter_macos_arm64_${FLUTTER_VERSION}-stable.zip" -o /tmp/flutter.zip
        unzip -q /tmp/flutter.zip -d flutter-macos-tmp
        mv flutter-macos-tmp/flutter flutter-macos
        rm -rf /tmp/flutter.zip flutter-macos-tmp
      fi
    - export PATH="$CI_PROJECT_DIR/flutter-macos/bin:$PATH"
    - cp $ENV_FILE .env.json
    - cp $FIREBASE_IOS_CONFIG ios/Runner/GoogleService-Info.plist
    - flutter clean
    - flutter pub get

# Reusable rule sets
.rules_tag: &rules_tag
  rules:
    - if: $CI_COMMIT_TAG

# ── Test ──────────────────────────────────────────────────────────────────────

test_lint:
  stage: test
  <<: *flutter_setup
  <<: *rules_tag
  script:
    - flutter analyze
    - flutter test

# ── Release builds (tag only) ─────────────────────────────────────────────────

build_android_release:
  stage: build_release
  <<: *flutter_setup
  <<: *rules_tag
  script:
    - flutter build apk --release
    - flutter build appbundle --release
  artifacts:
    paths:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/bundle/release/app-release.aab
    expire_in: 30 days

build_ios_release:
  stage: build_release
  <<: *flutter_setup_ios
  <<: *rules_tag
  tags:
    - saas-macos-medium-m1
  script:
    - flutter build ios --release --no-codesign
  artifacts:
    paths:
      - build/ios/iphoneos/Runner.app
    expire_in: 30 days

# ── Secret detection ──────────────────────────────────────────────────────────

secret_detection:
  stage: secret-detection

include:
  - template: Security/Secret-Detection.gitlab-ci.yml