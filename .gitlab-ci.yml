stages:
  - test
  - build_verify
  - build_release
  - secret-detection

variables:
  SECRET_DETECTION_ENABLED: 'true'
  FLUTTER_HOME: /builds/flutter
  PATH: $FLUTTER_HOME/bin:$PATH
  CACHE_COMPRESSION_LEVEL: fastest

# Shared setup for Flutter projects
.flutter_setup: &flutter_setup
  image: ubuntu:latest
  cache:
    paths:
      - .pub-cache/
      - build/
  before_script:
    - apt-get update && apt-get install -y git curl unzip openjdk-11-jdk-headless
    - mkdir -p .pub-cache
    # Install Flutter
    - curl -fsSL https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.24.0-stable.tar.xz | tar xJ -C /tmp
    - export PATH="/tmp/flutter/bin:$PATH"
    # Setup environment and config files from CI/CD variables
    - cp $ENV_FILE .env.json
    - cp $FIREBASE_ANDROID_CONFIG android/app/google-services.json
    - flutter clean
    - flutter pub get

# iOS-specific setup
.flutter_setup_ios: &flutter_setup_ios
  image: macos-12
  cache:
    paths:
      - .pub-cache/
      - build/
  before_script:
    - mkdir -p .pub-cache
    # Setup environment and config files from CI/CD variables
    - cp $ENV_FILE .env.json
    - cp $FIREBASE_IOS_CONFIG ios/Runner/GoogleService-Info.plist
    - flutter clean
    - flutter pub get

# Test stage: lint and tests on all branches with MRs
test_lint:
  stage: test
  <<: *flutter_setup
  script:
    - flutter analyze
    - flutter test
  only:
    - merge_requests
    - main
    - develop

# Build verification for MRs (no artifacts kept)
verify_build_android:
  stage: build_verify
  <<: *flutter_setup
  script:
    - flutter build apk --release --no-codesign
  only:
    - merge_requests
  artifacts:
    reports:
      dotenv: build.env
    expire_in: 1 hour

verify_build_ios:
  stage: build_verify
  image: macos-12
  <<: *flutter_setup_ios
  script:
    - flutter build ios --release --no-codesign
  only:
    - merge_requests
  artifacts:
    reports:
      dotenv: build.env
    expire_in: 1 hour

# Release builds for main branch (artifacts kept)
build_android_release:
  stage: build_release
  <<: *flutter_setup
  script:
    - flutter build apk --release --no-codesign
    - flutter build appbundle --release --no-codesign
  only:
    - main
  artifacts:
    paths:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/bundle/release/app-release.aab
    expire_in: 30 days
  when: on_success

build_ios_release:
  stage: build_release
  image: macos-12
  <<: *flutter_setup_ios
  script:
    - flutter build ios --release --no-codesign
  only:
    - main
  artifacts:
    paths:
      - build/ios/iphoneos/Runner.app
    expire_in: 30 days
  when: on_success

secret_detection:
  stage: secret-detection

include:
  - template: Security/Secret-Detection.gitlab-ci.yml
